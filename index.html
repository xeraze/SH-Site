<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/emblem.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Комунальне некомерційне підприємство «Слобідська центральна районна лікарня» Слобідської міської ради — довідковий центр для пацієнтів." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Слобідська ЦРЛ — Довідковий центр</title>
    <script>
      (function () {
        var search = window.location.search;
        if (search[1] === "p" && search[2] === "=") {
          var decoded = search.slice(3).split("&q=");
          window.history.replaceState(
            null,
            "",
            window.location.pathname.slice(0, -1) +
              decoded[0].replace(/~and~/g, "&") +
              (decoded[1] ? "?" + decoded[1].replace(/~and~/g, "&") : "") +
              window.location.hash,
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
