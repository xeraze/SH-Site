name = "slobidska-auth"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# KV namespace для зберігання кодів, сесій та списку персоналу.
# Створіть через: npx wrangler kv namespace create AUTH_KV
# Потім впишіть отриманий id нижче замість "REPLACE_WITH_KV_ID"
[[kv_namespaces]]
binding = "AUTH_KV"
id = "REPLACE_WITH_KV_ID"

# Змінні середовища. DISCORD_WEBHOOK_URL краще зберігати як секрет
# (npx wrangler secret put DISCORD_WEBHOOK_URL), а не тут у відкритому вигляді.
[vars]
ALLOWED_ORIGIN = "https://YOUR-GITHUB-USERNAME.github.io"
