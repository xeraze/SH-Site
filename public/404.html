<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>КНП «Слобідська ЦРЛ» СМР</title>
    <script>
      // GitHub Pages не вміє віддавати index.html для довільних шляхів
      // (наприклад /portal/dashboard). Цей скрипт перенаправляє будь-який
      // 404-шлях на головну сторінку, зберігаючи оригінальний шлях у
      // параметрі запиту — а index.html вже відновлює його через History API.
      var pathSegmentsToKeep = 1; // для GitHub Pages у репозиторії потрібно зберігати один сегмент шляху
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
        "/?p=/" + l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
